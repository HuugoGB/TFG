<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva Hotel</title>

    <style>
        body {
            background: linear-gradient(135deg, #f5f5f5, #e9e9e9);
            font-family: "Segoe UI", Arial, sans-serif;
        }
        #contenedorReserva {
            max-width: 1200px;
            margin: 80px auto;
            padding: 0 20px;
        }

        .reserva-form {
            display: flex;
            align-items: end;
            gap: 20px;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            flex-wrap: wrap;
            transition: 0.3s;
        }

        .reserva-form:hover {
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.18);
        }

        .campo {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 160px;
        }

        .campo label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #444;
        }

        .campo input,
        .campo select {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            background: #fafafa;
            transition: 0.25s;
        }

        .campo input:focus,
        .campo select:focus {
            outline: none;
            background: white;
            border-color: #111;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
        }

        .buscarBtn {
            background: linear-gradient(135deg, #111, #333);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            height: 44px;
            transition: 0.2s;
        }

        .buscarBtn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25);
        }

        .personas-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .personas-selector button {
            width: 35px;
            height: 35px;
            border: none;
            border-radius: 8px;
            background: #eee;
            font-size: 22px;
            font-weight: bold;
            color: #111; /* 🔥 CLAVE */
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .personas-selector span {
            min-width: 20px;
            text-align: center;
            font-weight: 600;
        }

        .servicios-wrapper {
            width: 100%;
            margin-top: 15px;
        }

        .servicios-titulo {
            font-weight: 700;
            margin-bottom: 8px;
        }

        .servicio-extra {
            display: inline-flex;
            align-items: center;
            margin-right: 15px;
            font-size: 14px;
        }

        .login-warning {
            max-width: 600px;
            margin: 80px auto;
            padding: 35px;
            background: white;
            border-radius: 18px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .login-warning a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: #111;
            color: white;
            border-radius: 10px;
            text-decoration: none;
        }
    </style>

</head>

<body>

    <div id="contenedorReserva">

        <form id="formDisponibilidad" class="reserva-form">

            <div class="campo">
                <label>Entrada</label>
                <input type="date" id="entrada" name="entrada" required>
            </div>

            <div class="campo">
                <label>Salida</label>
                <input type="date" id="salida" name="salida" required>
            </div>

            <div class="campo">
                <label>Personas</label>

                <div class="personas-selector">

                    <button type="button" id="menos">-</button>

                    <span id="numPersonas">2</span>

                    <button type="button" id="mas">+</button>

                </div>

                <input type="hidden" id="personas" name="personas" value="2">

            </div>

            <div class="campo">
                <label>Régimen</label>
                <select id="regimenSelect" name="regimen">
                    <option value="">Seleccione régimen</option>
                </select>
            </div>

            <button type="submit" class="buscarBtn">Buscar</button>

            <div class="servicios-wrapper" id="serviciosContainer"></div>

        </form>

    </div>

    <div id="resultado"></div>

    <script>

        /* CONTROL LOGIN */

        document.addEventListener("DOMContentLoaded", function () {

            const idCliente = localStorage.getItem("idCliente");
            const contenedor = document.getElementById("contenedorReserva");
            const resultado = document.getElementById("resultado");

            if (!idCliente) {

                contenedor.style.display = "none";

                resultado.innerHTML = `
                <div class="login-warning">
                    <h3>Inicia sesión para consultar disponibilidad</h3>
                    <p>Debes iniciar sesión para poder realizar una reserva.</p>
                    <a href="/wordpress/login">Iniciar sesión</a>
                </div>
`;

            }

        });


        /* SELECTOR PERSONAS */

        let personas = 2;

        const numPersonas = document.getElementById("numPersonas");
        const inputPersonas = document.getElementById("personas");

        document.getElementById("mas").onclick = function () {

            if (personas < 5) {
                personas++;
                numPersonas.textContent = personas;
                inputPersonas.value = personas;
            }

        };

        document.getElementById("menos").onclick = function () {

            if (personas > 1) {
                personas--;
                numPersonas.textContent = personas;
                inputPersonas.value = personas;
            }

        };


        /*CARGAR REGIMEN */

        window.addEventListener("load", async function () {

            try {

                const res = await fetch("http://localhost:3000/api/regimen/");
                const data = await res.json();

                const select = document.getElementById("regimenSelect");

                data.resultRegimen.forEach(reg => {

                    const option = document.createElement("option");
                    option.value = reg.tipoRegimen;
                    option.textContent = reg.tipoRegimen;

                    select.appendChild(option);

                });

            } catch (e) {

                console.error(e);

            }


            /*SERVICIOS EXTRA  */

            try {

                const res = await fetch("http://localhost:3000/api/servicio_extra/");
                const data = await res.json();

                const container = document.getElementById("serviciosContainer");

                const titulo = document.createElement("p");
                titulo.textContent = "Servicios extra:";
                titulo.classList.add("servicios-titulo");

                container.appendChild(titulo);

                data.resultServicioExtra.forEach(serv => {

                    const wrapper = document.createElement("div");
                    wrapper.classList.add("servicio-extra");

                    const check = document.createElement("input");
                    check.type = "checkbox";
                    check.value = serv.idServiciosExtras;
                    check.name = "serviciosExtra[]";

                    const label = document.createElement("label");
                    label.textContent = serv.nombreServicio;

                    wrapper.appendChild(check);
                    wrapper.appendChild(label);

                    container.appendChild(wrapper);

                });

            } catch (e) {

                console.error(e);

            }

        });


        /*CONSULTAR DISPONIBILIDAD */

        document.getElementById("formDisponibilidad").addEventListener("submit", async function (e) {

            e.preventDefault();

            const serviciosExtra = Array.from(
                document.querySelectorAll('input[name="serviciosExtra[]"]:checked')
            ).map(cb => cb.value);

            localStorage.setItem("serviciosExtra", JSON.stringify(serviciosExtra));

            const entrada = this.entrada.value;
            const salida = this.salida.value;
            const pax = this.personas.value;
            const tipoRegimen = document.getElementById("regimenSelect").value;

            localStorage.setItem("diaEntrada", entrada);
            localStorage.setItem("diaSalida", salida);
            localStorage.setItem("pax", pax);
            localStorage.setItem("tipoRegimen", tipoRegimen);

            const url = `http://localhost:3000/api/tipo_habitacion/disponibilidad?pax=${pax}&dia_entrada=${entrada}&dia_salida=${salida}`;

            const res = await fetch(url);
            const data = await res.json();

            localStorage.setItem("disponibilidad", JSON.stringify(data.result));

            window.location.href = "http://localhost/wordpress/?page_id=10";

        });

    </script>

</body>

</html>
