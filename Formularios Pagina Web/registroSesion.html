<style>
    .registroSesion-form {
        max-width: 500px;
        margin: 40px auto;
        padding: 25px;
        background: #ffffff;
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        font-family: Arial, sans-serif;
    }

    .registroSesion-form h2 {
        text-align: center;
        margin-bottom: 15px;
        font-size: 24px;
        color: #333;
    }

    .registroSesion-form input,
    .registroSesion-form textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 8px;
        margin-bottom: 15px;
        font-size: 14px;
    }

    .registroSesion-form button {
        width: 100%;
        padding: 12px;
        background: #080707;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    .registroSesion-form button:hover {
        background: #403939;
    }
</style>

<form id="registroSesion" class="registroSesion-form">
    <input id="nombre" type="text" placeholder="Escriba su nombre" required>
    <input id="apellido" type="text" placeholder="Escriba su apellido" required>
    <input id="dni" type="text" placeholder="Escriba su DNI" required>
    <input id="email" type="email" placeholder="Correo Electronico" required>
    <input id="contrasena"type="password" placeholder="Contraseña" required>
    <button type="submit">Registrar Sesión</button>
</form>
