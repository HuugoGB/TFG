<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GDS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- NAVBAR (mismo patrón que el resto del sistema) -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="main.html">GDS Agencia</a>
        </div>
    </nav>

    <!-- MAIN -->
    <main class="d-flex justify-content-center align-items-center" style="min-height: 85vh;">

        <div class="card shadow-sm p-4" style="min-width: 350px; max-width: 400px; width: 100%;">

            <div class="text-center mb-3">
                <h1 class="h3 fw-bold">Log In</h1>
                <p class="text-muted mb-0">Accede a tu cuenta</p>
            </div>

            <form id="login">

                <div class="mb-3">
                    <label class="form-label">Correo Electrónico</label>
                    <input id="email" name="email" type="email" class="form-control" placeholder="email@ejemplo.com">
                </div>

                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input id="contrasena" name="contrasena" type="password" class="form-control" placeholder="**********">
                </div>

                <div class="mb-3">
                    <label class="form-label">CIF</label>
                    <input id="cif" name="cif" type="text" class="form-control">
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="remember">
                    <label class="form-check-label" for="remember">Recuérdame</label>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Iniciar Sesión
                </button>

            </form>

        </div>

    </main>

    <!-- FOOTER -->
    <footer class="text-center text-muted py-3">
        © 2026 GDS Hotel System
    </footer>
    <script src="js/login.js"></script>

</body>

</html>
