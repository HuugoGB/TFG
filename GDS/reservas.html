<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Reservas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- 🔝 HEADER -->
<header class="bg-dark text-white py-3">
    <div class="container d-flex justify-content-between align-items-center">
        <h4 class="mb-0">GDS Agencia</h4>
    </div>
</header>

<!-- 🔎 BUSCADOR -->
<section class="bg-light py-3 border-bottom">
    <div class="container">
        <div class="row g-2">

            <div class="col-md-3">
                <input type="text" class="form-control" placeholder="Destino (ej: Palma)">
            </div>

            <div class="col-md-2">
                <input type="date" class="form-control">
            </div>

            <div class="col-md-2">
                <input type="date" class="form-control">
            </div>

            <div class="col-md-2">
                <input type="number" class="form-control" placeholder="Adultos">
            </div>

            <div class="col-md-2">
                <input type="number" class="form-control" placeholder="Niños">
            </div>

            <div class="col-md-1 d-grid">
                <button class="btn btn-primary">🔍</button>
            </div>

        </div>
    </div>
</section>

<!-- 🏨 CONTENIDO -->
<main class="container mt-4">

    <div class="row">

        <!-- 📊 RESULTADOS -->
        <div class="col-lg-8">

            <h5 class="mb-3">Resultados</h5>

            <!-- Card resultado -->
            <div class="card mb-3">
                <div class="card-body d-flex justify-content-between align-items-center">

                    <div>
                        <h6 class="mb-1">Hotel Sol Palma</h6>
                        <small>Doble + AD</small><br>
                        <strong>120€/noche</strong>
                    </div>

                    <button class="btn btn-primary">Seleccionar</button>

                </div>
            </div>

            <!-- Otro ejemplo -->
            <div class="card mb-3">
                <div class="card-body d-flex justify-content-between align-items-center">

                    <div>
                        <h6 class="mb-1">Hotel Playa Azul</h6>
                        <small>Suite + MP</small><br>
                        <strong>180€/noche</strong>
                    </div>

                    <button class="btn btn-primary">Seleccionar</button>

                </div>
            </div>

        </div>

        <!-- 📦 PANEL RESERVA -->
        <div class="col-lg-4">

            <div class="card">
                <div class="card-header">
                    Nueva Reserva
                </div>

                <div class="card-body">

                    <!-- Cliente -->
                    <div class="mb-3">
                        <label class="form-label">Cliente</label>
                        <input type="text" class="form-control" placeholder="Buscar cliente...">
                    </div>

                    <!-- Detalles -->
                    <div class="mb-3">
                        <label class="form-label">Habitación</label>
                        <input type="text" class="form-control" disabled placeholder="Seleccionar hotel">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Régimen</label>
                        <input type="text" class="form-control" disabled>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Fechas</label>
                        <input type="text" class="form-control" disabled>
                    </div>

                    <!-- Precio -->
                    <div class="mb-3">
                        <label class="form-label">Total</label>
                        <input type="text" class="form-control" value="0€" disabled>
                    </div>

                    <!-- Acciones -->
                    <div class="d-grid gap-2">
                        <button class="btn btn-success">Confirmar Reserva</button>
                        <button class="btn btn-warning">Guardar como Pendiente</button>
                    </div>

                </div>
            </div>

        </div>

    </div>

    <!-- 🧾 LISTADO DE RESERVAS -->
    <div class="mt-5">
        <h5>Reservas recientes</h5>

        <table class="table table-striped mt-3">
            <thead class="table-dark">
                <tr>
                    <th>Localizador</th>
                    <th>Cliente</th>
                    <th>Hotel</th>
                    <th>Fechas</th>
                    <th>Estado</th>
                    <th>Total</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>ABC123</td>
                    <td>Juan Pérez</td>
                    <td>Hotel Sol Palma</td>
                    <td>10-15 Ago</td>
                    <td><span class="badge bg-success">Confirmada</span></td>
                    <td>600€</td>
                    <td>
                        <button class="btn btn-sm btn-primary">Ver</button>
                        <button class="btn btn-sm btn-danger">Cancelar</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</main>

<!-- 🔻 FOOTER -->
<footer class="text-center text-muted py-3">
    © 2026 GDS Hotel System
</footer>

</body>
</html>
