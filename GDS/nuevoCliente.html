<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
    <header class="bg-dark text-white py-3">
    <div class="container">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <a class="navbar-brand fw-bold" href="main.html">GDS Agencia</a>
    </div>
</header>
    <main class="container mt-4">
        <div class="card shadow-sm">

                <div class="card-header bg-white">
                    <h5 class="mb-0">Nuevo Cliente</h5>
                </div>

                <div class="card-body">

                    <form id="crearCliente">

                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input id="nombreCliente" class="form-control" type="text" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Apellido</label>
                            <input id="apellido" class="form-control" type="text" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">DNI</label>
                            <input id="dni" class="form-control" type="text" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input id="email" class="form-control" type="email" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">NumTelefono</label>
                            <input id="telefono" class="form-control" type="tel" required>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">
                                Crear Cliente
                            </button>
                            <a class="btn btn-primary" href="clientes.html">Volver Atras</a>
                        </div>

                    </form>

                </div>
    </main>
    <script src="js/crearCliente.js"></script>
</body>
</html>
