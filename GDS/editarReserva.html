<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
    <header class="bg-dark text-white py-3">
    <div class="container">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <a class="navbar-brand fw-bold" href="main.html">GDS Agencia</a>
    </div>
</header>
    <main class="container mt-4">
        <div class="card shadow-sm">

                <div class="card-header bg-white">
                    <h5 class="mb-0">Nuevo Cliente</h5>
                </div>

                <div class="card-body">

                    <form id="editarReserva">

                        <!-- Cliente -->
                        <div class="mb-3">
                            <label class="form-label">Cliente</label>
                            <select class="form-select" id="cliente">
                                <option value="">Seleccionar cliente</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Personas</label>
                            <input type="number" class="form-control" id="personas" min="1" max="4">
                        </div>

                        <!-- Detalles -->
                        <div class="mb-3">
                            <label class="form-label">Habitación</label>
                            <select class="form-select" id="habitacion">
                                <option value="">Seleccionar tipo de habitacion</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Régimen</label>
                            <select class="form-select" id="regimen">
                                <option value="">Seleccion régimen</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Fecha Entrada</label>
                            <input type="date" class="form-control" id="entrada">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Fecha Salida</label>
                            <input type="date" class="form-control" id="salida">
                        </div>

                        <!-- Precio -->
                        <div class="mb-3">
                            <label class="form-label">Precio</label>
                            <input type="number" class="form-control" id="precio">
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">
                                Editar Reserva
                            </button>
                            <a class="btn btn-primary" href="reservas.html">Volver Atras</a>
                        </div>

                    </form>

                </div>
    </main>
    <script src="js/editarReserva.js"></script>
</body>
</html>
